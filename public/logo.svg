<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8572A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C43D12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.22" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.06" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle noise texture overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#cardGrad)" opacity="0.4"/>

  <!-- Main credit card body -->
  <rect x="80" y="148" width="352" height="220" rx="24" ry="24" fill="rgba(255,255,255,0.18)" filter="url(#shadow)"/>
  <rect x="80" y="148" width="352" height="220" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- Card stripe (top band) -->
  <rect x="80" y="196" width="352" height="44" fill="rgba(255,255,255,0.12)"/>

  <!-- EMV chip -->
  <rect x="112" y="260" width="52" height="40" rx="7" ry="7" fill="rgba(255,255,255,0.55)"/>
  <line x1="112" y1="278" x2="164" y2="278" stroke="rgba(180,120,60,0.5)" stroke-width="1.5"/>
  <line x1="136" y1="260" x2="136" y2="300" stroke="rgba(180,120,60,0.5)" stroke-width="1.5"/>

  <!-- Card dots (last 4 digits placeholder) -->
  <circle cx="196" cy="316" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="214" cy="316" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="232" cy="316" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="250" cy="316" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Tracking / chart mark — three rising bars top-right -->
  <rect x="330" y="288" width="20" height="32" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="358" y="272" width="20" height="48" rx="4" fill="rgba(255,255,255,0.75)"/>
  <rect x="386" y="256" width="20" height="64" rx="4" fill="rgba(255,255,255,1)"/>

  <!-- Small upward tick on tallest bar -->
  <polyline points="390,248 396,238 402,244" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
